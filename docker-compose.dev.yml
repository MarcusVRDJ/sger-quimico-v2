services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      [
        "sh",
        "-lc",
        "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000",
      ]
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
